const PASSWORD = "catbutt69";

function PasswordGate({ onUnlock }) {
  const [value, setValue] = useState("");
  const [error, setError] = useState(false);
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), 80); return () => clearTimeout(t); }, []);
  function handleSubmit(e) {
    e.preventDefault();
    if (value === PASSWORD) { onUnlock(); }
    else { setError(true); setValue(""); setTimeout(() => setError(false), 1800); }
  }
  return h("div", { style: { minHeight:"100vh", background:"#09090b", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"'DM Sans',sans-serif" } },
    h("style", null, `
      .pw-wrap{display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(10px);transition:opacity .8s ease,transform .8s ease;}
      .pw-wrap.vis{opacity:1;transform:translateY(0);}
      .pw-logo{font-size:.65rem;font-weight:400;letter-spacing:.5em;text-transform:uppercase;color:rgba(220,215,205,.35);margin-bottom:2.5rem;}
      .pw-rule{width:1px;height:2rem;background:linear-gradient(to bottom,transparent,rgba(123,175,212,.3),transparent);margin-bottom:2.5rem;}
      .pw-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2.4rem);color:#f0ebe3;margin-bottom:.4rem;text-align:center;}
      .pw-sub{font-size:.8rem;font-weight:300;color:rgba(220,215,205,.35);margin-bottom:2.5rem;font-style:italic;}
      .pw-form{display:flex;flex-direction:column;align-items:center;gap:.9rem;width:260px;}
      .pw-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(123,175,212,.2);color:#f0ebe3;font-family:'DM Sans',sans-serif;font-size:.95rem;padding:.7rem 1rem;outline:none;text-align:center;letter-spacing:.1em;transition:border-color .25s ease;}
      .pw-input:focus{border-color:rgba(123,175,212,.6);}
      .pw-input.err{border-color:rgba(200,80,80,.6);animation:shake .4s ease;}
      .pw-btn{width:100%;background:none;border:1px solid rgba(123,175,212,.35);color:#7bafd4;font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;padding:.7rem;cursor:pointer;transition:background .25s ease;}
      .pw-btn:hover{background:rgba(123,175,212,.1);}
      .pw-error{font-size:.72rem;color:rgba(200,80,80,.8);height:1rem;}
      @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Playfair+Display:wght@400&display=swap');
    `),
    h("div", { className: "pw-wrap" + (visible ? " vis" : "") },
      h("div", { className: "pw-logo" }, "Southern & Southern LLC"),
      h("div", { className: "pw-rule" }),
      h("img", { src: "https://raw.githubusercontent.com/psouthern-llc/southern-and-southern/main/IMG_0822.jpg", alt: "Rufus", style: { width: "180px", height: "180px", objectFit: "cover", borderRadius: "50%", marginBottom: "1.5rem", filter: "brightness(0.95)" } }),
      h("div", { className: "pw-title" }, "Coming Soon"),
      h("div", { className: "pw-sub" }, "Site under construction"),
      h("form", { className: "pw-form", onSubmit: handleSubmit },
        h("input", { className: "pw-input" + (error ? " err" : ""), type: "password", placeholder: "Password", value, onChange: e => setValue(e.target.value), autoFocus: true }),
        h("button", { className: "pw-btn", type: "submit" }, "Enter"),
        h("div", { className: "pw-error" }, error ? "Incorrect password" : "")
      )
    )
  );
}

function App() {
  const [page, setPage] = useState("home");
  const [entered, setEntered] = useState(false);
  useEffect(() => { const t = setTimeout(() => setEntered(true), 120); return () => clearTimeout(t); }, []);
  useEffect(() => { window.scrollTo(0, 0); }, [page]);
  return h("div", { style: { fontFamily: "'DM Sans',sans-serif", background: "#0a0a0b", minHeight: "100vh", color: "#ddd8d0" } },
    h("style", null, CSS),
    h("div", { style: { position:"fixed", bottom:"1rem", right:"1rem", zIndex:999, fontFamily:"'DM Sans',sans-serif", fontSize:".55rem", letterSpacing:".15em", color:"rgba(220,215,205,.2)", pointerEvents:"none" } }, "v1.20"),
    page === "home"    && h(HomePage,    { entered, setPage }),
    page === "sound"   && h(SoundPage,   { setPage }),
    page === "picture" && h(PicturePage, { setPage })
  );
}

function HomePage({ entered, setPage }) {
  return h("div", { className: "home" },
    h("div", { className: "half", onClick: () => setPage("picture") },
      h("div", { className: "bg-blur", style: { backgroundImage: "url('" + PICTURE_BG + "')" } }),
      h("div", { className: "wash wash-picture" }),
      h("div", { className: "vign vign-left" }),
  
      h("div", { className: "hc " + (entered ? "vis" : ""), style: { transitionDelay: "0.12s" } },
        h("div", { className: "over over-picture" }, "Picture"),
        h("div", { className: "hname-overflow hname-overflow-right" }, "Aleksandra", h("br"), "Gezentsvey"),
        h("div", { className: "hrole" }, "Documentarian"),
        h("button", { className: "enter-btn enter-btn-picture enter-btn-rev" }, h("span", null, "Enter"), h("span", { className: "eline eline-picture" }))
      )
    ),
