function App() {
  const [page, setPage] = useState("home");
  const [entered, setEntered] = useState(false);
  useEffect(() => { const t = setTimeout(() => setEntered(true), 120); return () => clearTimeout(t); }, []);
  useEffect(() => { window.scrollTo(0, 0); }, [page]);
  return h("div", { style: { fontFamily: "'DM Sans',sans-serif", background: "#0a0a0b", minHeight: "100vh", color: "#ddd8d0" } },
    h("style", null, CSS),
    h("div", { style: { position:"fixed", bottom:"1rem", right:"1rem", zIndex:999, fontFamily:"'DM Sans',sans-serif", fontSize:".55rem", letterSpacing:".15em", color:"rgba(220,215,205,.2)", pointerEvents:"none" } }, "v1.48"),
    page !== "home" && h("nav", { className: "inav" },
      h("button", { className: "back-btn" + (page === "picture" ? " back-btn-picture" : ""), onClick: () => setPage("home") }, "\u2190 Back"),
      h("span", { className: "inav-co" }, "Southern & Southern LLC")
    ),
    page === "home"    && h(HomePage,    { entered, setPage }),
    page === "sound"   && h(SoundPage,   { setPage }),
    page === "picture" && h(PicturePage, { setPage })
  );
}

function HomePage({ entered, setPage }) {
  return h("div", { className: "home" },
    h("div", { className: "half", onClick: () => setPage("picture") },
      h("div", { className: "bg-blur", style: { backgroundImage: "url('" + PICTURE_BG + "')", backgroundPosition: "50% 20%" } }),
      h("div", { className: "wash wash-picture" }),
      h("div", { className: "vign vign-left" }),

      h("div", { className: "hc " + (entered ? "vis" : ""), style: { transitionDelay: "0.12s" } },
        h("div", { className: "over over-picture" }, "Picture"),
        h("div", { className: "hname-overflow hname-overflow-right" }, "Aleks", h("br"), "Gezentsvey"),
        h("div", { className: "hrole" }, "Documentarian"),
        h("button", { className: "enter-btn enter-btn-picture enter-btn-rev" }, h("span", null, "Enter"), h("span", { className: "eline eline-picture" }))
      )
    ),
    h("div", { className: "vdiv" }),
    h("div", { className: "lockup " + (entered ? "vis" : "") },
      h("div", { className: "lname" }, "Southern & Southern"),
      h("div", { className: "lrule" }),
      h("div", { className: "lsub" }, "LLC")
    ),
